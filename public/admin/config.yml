# ZOE DESIGN FORGE — Content Management System
# ZDF team: go to zoeforge.com/admin to manage content.
# Changes are saved as git commits and auto-deploy via Vercel.

backend:
  name: git-gateway
  branch: main
  # For Git Gateway setup:
  # 1. Deploy to Vercel
  # 2. Connect repo to Decap CMS (netlify.com/app/decap-cms)
  # 3. Enable Git Gateway authentication
  #
  # Alternative: use "name: github" with repo: username/repo
  # for direct GitHub login (simpler for non-technical teams)

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    delete: true
    path: "{{slug}}"
    slug: "{{slug}}"
    extension: .md
    format: frontmatter
    sort: "date:desc"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Publish Date", name: "date", widget: "datetime", required: true }
      - { label: "Author", name: "author", widget: "string", default: "ZOE DESIGN FORGE Team" }
      - { label: "Category", name: "category", widget: "select",
          options: ["Residential Design", "Commercial Design", "Interior Design",
                    "Sustainable Design", "Landscape Design", "Furniture Design",
                    "Industry Insights", "Company News"] }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: true }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: true }

  - name: "projects"
    label: "Portfolio Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    delete: true
    extension: .md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select",
          options: ["Residential", "Commercial", "Hospitality", "Furniture", "Landscape"] }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Scope", name: "scope", widget: "text" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Project Images", name: "images", widget: "list",
          field: { label: "Image", name: "image", widget: "image" } }

  - name: "team"
    label: "Team Members"
    label_singular: "Team Member"
    folder: "content/team"
    create: true
    delete: true
    extension: .md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Photo", name: "image", widget: "image", required: false }
      - { label: "Qualifications", name: "qualifications", widget: "list",
          field: { label: "Qualification", name: "qualification", widget: "string" } }

  - name: "services"
    label: "Services"
    label_singular: "Service"
    folder: "content/services"
    create: true
    delete: true
    extension: .md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "Service Name", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Icon", name: "icon", widget: "select",
          options: ["bi-bricks", "bi-house-heart", "bi-vector-pen",
                    "bi-flower1", "bi-chair", "bi-ruler-combined"] }
      - { label: "Process Steps", name: "process", widget: "list",
          field: { label: "Step", name: "step", widget: "string" } }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Company Info"
        name: "company"
        file: "content/settings/company.json"
        fields:
          - { label: "Company Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "text" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
